name: Docker CI

on:
  push:
    branches:
      - main

jobs:
  docker-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout App Repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.TOKEN_DOCKER }}

      - name: Build Docker Image
        run: |
          docker build -t meetchhatrala789/nodeapp:${{ github.sha }} ./my-react-app

      
      - name: Push Docker Image
        run: |
          docker push meetchhatrala789/nodeapp:${{ github.sha }}

      
      - name: Clone Timoni Repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/meetchhatrala/timoni-repo.git

     
      - name: Show values.cue before update
        run: |
          cd timoni-repo
          echo "Before update:"
          cat values.cue

      
      - name: Update image tag in values.cue
        run: |
          cd timoni-repo
          IMAGE_TAG=${{ github.sha }}

          sed -i "s/tag:[[:space:]]*\".*\"/tag:        \"$IMAGE_TAG\"/" values.cue

          echo "After update:"
          cat values.cue

      
      - name: Commit and push changes
        run: |
          cd timoni-repo
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add values.cue

          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "Update image tag to ${{ github.sha }}"
            git push https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/meetchhatrala/timoni-repo.git HEAD:main
          fi


