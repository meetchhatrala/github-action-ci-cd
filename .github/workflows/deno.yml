name: Docker CI

on:
  push:
    branches:
      - main

jobs:
  docker-ci:
    runs-on: ubuntu-latest

    steps:
      # Checkout application repo
      - name: Checkout App Repo
        uses: actions/checkout@v4

      # Login DockerHub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.TOKEN_DOCKER }}

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t meetchhatrala789/nodeapp:${{ github.sha }} ./my-react-app

      # Push Docker Image
      - name: Push Docker Image
        run: |
          docker push meetchhatrala789/nodeapp:${{ github.sha }}

      # Clone Timoni Repo
      - name: Clone Timoni Repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/meetchhatrala/timoni-repo.git

      # Update Image Tag
      - name: Update image tag in values.cue
        run: |
          cd timoni-repo
          IMAGE_TAG=${{ github.sha }}
          sed -i "s/tag: \".*\"/tag: \"$IMAGE_TAG\"/" values.cue
          echo "Updated values.cue:"
          cat values.cue

      # Commit and Push Changes
      - name: Commit and push changes
        run: |
          cd timoni-repo
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add values.cue

          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "Update image tag to ${{ github.sha }}"
            git push https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/meetchhatrala/timoni-repo.git HEAD:main
          fi