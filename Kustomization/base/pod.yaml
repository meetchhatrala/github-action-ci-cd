apiVersion: v1
kind: Deployment
metadata:
  name: test-deployment
  namespace: default
  labels:
    env: node-1
spec:
  replicas: 1
  selector:
    matchLabels:
      env: node-1
  template:
    metadata:
      labels:
        env: node-1
    spec:
      containers:   
      - name: test-container
        image: nginx:latest
        ports:
        - containerPort: 80